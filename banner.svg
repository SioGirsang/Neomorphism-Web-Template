<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="100%" height="auto">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#DCE7F5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C9EB2"/>
      <stop offset="100%" stop-color="#5B8A9E"/>
    </linearGradient>
  </defs>

  <rect width="960" height="440" fill="url(#bg)" rx="14"/>

  <!-- Decorative circles -->
  <circle cx="120" cy="100" r="180" fill="#7C9EB2" opacity="0.04"/>
  <circle cx="840" cy="350" r="200" fill="#7C9EB2" opacity="0.04"/>

  <!-- Thin accent line -->
  <rect x="340" y="160" width="280" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Title -->
  <text x="480" y="120" text-anchor="middle" font-family="'Segoe UI',-apple-system,sans-serif" font-size="42" font-weight="800" fill="#1E3A5F">Neomorphism Web Template</text>

  <text x="480" y="148" text-anchor="middle" font-family="'Segoe UI',-apple-system,sans-serif" font-size="16" fill="#64748B">Financial Dashboard — Neumorphic UI Design dengan Tailwind CSS</text>

  <!-- Feature tags -->
  <g transform="translate(480, 200)">
    <rect x="-140" y="-16" width="130" height="32" rx="16" fill="#FAFBFC" stroke="#DCE7F5" stroke-width="1"/>
    <text x="-75" y="6" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#7C9EB2" font-weight="600">Tailwind CSS</text>

    <rect x="0" y="-16" width="130" height="32" rx="16" fill="#FAFBFC" stroke="#DCE7F5" stroke-width="1"/>
    <text x="65" y="6" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#7C9EB2" font-weight="600">Vanilla JS</text>

    <rect x="140" y="-16" width="100" height="32" rx="16" fill="#FAFBFC" stroke="#DCE7F5" stroke-width="1"/>
    <text x="190" y="6" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#7C9EB2" font-weight="600">CSS3</text>
  </g>

  <!-- Bottom desc -->
  <text x="480" y="300" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="13" fill="#94A3B8">Dashboard neumorphic ringan &bull; Responsif &bull; Tanpa framework berat &bull; Buka index.html langsung jalan</text>

  <!-- Bottom bar -->
  <rect x="0" y="436" width="960" height="4" fill="#7C9EB2" opacity="0.15" rx="2"/>
</svg>
