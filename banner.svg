<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" width="100%" height="auto">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F4F8">
        <animate attributeName="stop-color" values="#F0F4F8;#E8EEF6;#F0F4F8" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#E8EEF6">
        <animate attributeName="stop-color" values="#E8EEF6;#DCE7F5;#E8EEF6" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F0F4F8">
        <animate attributeName="stop-color" values="#F0F4F8;#E2EAF3;#F0F4F8" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C9EB2"/>
      <stop offset="100%" stop-color="#5B8A9E"/>
    </linearGradient>

    <linearGradient id="incomeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>

    <linearGradient id="expenseGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F43F5E"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>

    <linearGradient id="neuCardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#EDF1F7"/>
    </linearGradient>

    <filter id="shadowOut" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="8" stdDeviation="16" flood-color="#B0C4D8" flood-opacity="0.35"/>
      <feDropShadow dx="-6" dy="-6" stdDeviation="12" flood-color="#FFFFFF" flood-opacity="0.6"/>
    </filter>

    <filter id="shadowIn" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="2" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#B0C4D8" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="offsetBlur" operator="in" result="shadow"/>
      <feOffset dx="-2" dy="-2" in="SourceAlpha" result="offsetBlur2"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.5" result="color2"/>
      <feComposite in="color2" in2="offsetBlur2" operator="in" result="shadow2"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="shadow2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#10B981" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowPrimary">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#7C9EB2" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .neu-card-bg { fill: url(#neuCardGrad); }

    .particle { animation: float linear infinite; }
    .particle:nth-child(odd) { animation-duration: 10s; }
    .particle:nth-child(even) { animation-duration: 15s; }
    @keyframes float {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.25; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-120px) translateX(20px); opacity: 0; }
    }

    .coin-float { animation: coinFloat 4s ease-in-out infinite; }
    .coin-float:nth-child(2) { animation-delay: 0.5s; }
    .coin-float:nth-child(3) { animation-delay: 1s; }
    @keyframes coinFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .bar-income { animation: barRise 1.5s ease-out forwards; transform-origin: bottom; }
    .bar-income:nth-child(1) { animation-delay: 0.1s; }
    .bar-income:nth-child(2) { animation-delay: 0.2s; }
    .bar-income:nth-child(3) { animation-delay: 0.3s; }
    .bar-income:nth-child(4) { animation-delay: 0.4s; }
    .bar-income:nth-child(5) { animation-delay: 0.5s; }
    .bar-income:nth-child(6) { animation-delay: 0.6s; }
    @keyframes barRise {
      0% { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }

    .bar-expense { animation: barRise 1.5s ease-out forwards; transform-origin: bottom; }
    .bar-expense:nth-child(1) { animation-delay: 0.15s; }
    .bar-expense:nth-child(2) { animation-delay: 0.25s; }
    .bar-expense:nth-child(3) { animation-delay: 0.35s; }
    .bar-expense:nth-child(4) { animation-delay: 0.45s; }
    .bar-expense:nth-child(5) { animation-delay: 0.55s; }
    .bar-expense:nth-child(6) { animation-delay: 0.65s; }

    .title-glow { animation: titleGlow 3s ease-in-out infinite; }
    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(124,158,178,0.15)); }
      50% { filter: drop-shadow(0 0 14px rgba(124,158,178,0.35)); }
    }

    .subtitle-slide { animation: subtitleSlide 5s ease-in-out infinite; }
    @keyframes subtitleSlide {
      0%, 100% { opacity: 0.75; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-2px); }
    }

    .badge-float { animation: badgeFloat 4s ease-in-out infinite; }
    .badge-float:nth-child(2) { animation-delay: 0.4s; }
    .badge-float:nth-child(3) { animation-delay: 0.8s; }
    .badge-float:nth-child(4) { animation-delay: 1.2s; }
    @keyframes badgeFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .pulse-ring { animation: pulseRing 3s ease-out infinite; transform-origin: 540px 185px; }
    @keyframes pulseRing {
      0% { transform: scale(0.95); opacity: 0.4; }
      50% { transform: scale(1.05); opacity: 0.7; }
      100% { transform: scale(0.95); opacity: 0.4; }
    }

    .avatar-pulse { animation: avatarGlow 3s ease-in-out infinite; }
    @keyframes avatarGlow {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(124,158,178,0.2)); }
      50% { filter: drop-shadow(0 0 16px rgba(124,158,178,0.5)); }
    }

    .signal-bar { animation: signalPulse 2s ease-in-out infinite; }
    .signal-bar:nth-child(2) { animation-delay: 0.2s; }
    .signal-bar:nth-child(3) { animation-delay: 0.4s; }
    .signal-bar:nth-child(4) { animation-delay: 0.6s; }
    .signal-bar:nth-child(5) { animation-delay: 0.8s; }
    @keyframes signalPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .line-dash { stroke-dasharray: 200; stroke-dashoffset: 200; animation: drawLine 3s ease-in-out infinite; }
    @keyframes drawLine {
      0% { stroke-dashoffset: 200; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 200; }
    }

    .stat-value { animation: countUp 2s ease-out forwards; }
    @keyframes countUp {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- Background -->
  <rect width="960" height="440" fill="url(#bgGrad)" rx="14"/>

  <!-- Subtle grid pattern -->
  <g fill="#7C9EB2" opacity="0.04">
    <circle cx="60" cy="60" r="1.5"/><circle cx="180" cy="60" r="1.5"/>
    <circle cx="300" cy="60" r="1.5"/><circle cx="420" cy="60" r="1.5"/>
    <circle cx="540" cy="60" r="1.5"/><circle cx="660" cy="60" r="1.5"/>
    <circle cx="780" cy="60" r="1.5"/><circle cx="900" cy="60" r="1.5"/>
    <circle cx="60" cy="180" r="1.5"/><circle cx="900" cy="180" r="1.5"/>
    <circle cx="60" cy="300" r="1.5"/><circle cx="900" cy="300" r="1.5"/>
    <circle cx="60" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/>
  </g>

  <!-- Particles -->
  <g class="particle"><circle cx="100" cy="350" r="2.5" fill="#7C9EB2" opacity="0.2"/></g>
  <g class="particle" style="animation-delay:1.5s"><circle cx="200" cy="380" r="2" fill="#10B981" opacity="0.2"/></g>
  <g class="particle" style="animation-delay:3s"><circle cx="350" cy="320" r="3" fill="#7C9EB2" opacity="0.15"/></g>
  <g class="particle" style="animation-delay:4.5s"><circle cx="700" cy="360" r="2" fill="#10B981" opacity="0.2"/></g>
  <g class="particle" style="animation-delay:2s"><circle cx="800" cy="330" r="2.5" fill="#F43F5E" opacity="0.15"/></g>
  <g class="particle" style="animation-delay:5.5s"><circle cx="880" cy="390" r="2" fill="#7C9EB2" opacity="0.15"/></g>
  <g class="particle" style="animation-delay:0.8s"><circle cx="160" cy="300" r="1.5" fill="#F43F5E" opacity="0.2"/></g>
  <g class="particle" style="animation-delay:3.8s"><circle cx="840" cy="290" r="2" fill="#10B981" opacity="0.15"/></g>

  <!-- Decorative curved lines -->
  <g stroke="#7C9EB2" fill="none" opacity="0.06" stroke-width="1.5">
    <path class="line-dash" d="M30,430 Q120,380 200,410 Q280,440 360,400"/>
    <path class="line-dash" style="animation-delay:1s" d="M600,50 Q700,20 800,60 Q880,90 940,50"/>
  </g>

  <!-- ===== MAIN CARD MOCKUP ===== -->
  <g transform="translate(300, 105)">
    <!-- Card shadow + bg -->
    <rect x="-50" y="-30" width="440" height="220" rx="18" fill="url(#neuCardGrad)" filter="url(#shadowOut)"/>
    <rect x="-50" y="-30" width="440" height="220" rx="18" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>

    <!-- Card header line -->
    <line x1="-35" y1="-12" x2="375" y2="-12" stroke="#7C9EB2" stroke-width="0.5" opacity="0.1"/>

    <!-- Mock stat boxes -->
    <!-- Income stat -->
    <g class="coin-float" transform="translate(-30, 5)">
      <rect x="0" y="0" width="100" height="44" rx="10" fill="#ECFDF5" filter="url(#shadowIn)"/>
      <text x="50" y="28" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="800" fill="#10B981">Rp 24,3Jt</text>
      <text x="50" y="-4" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" font-weight="600" fill="#6B7280" letter-spacing="1.5">INCOME</text>
    </g>

    <!-- Expense stat -->
    <g class="coin-float" style="animation-delay:0.5s" transform="translate(85, 5)">
      <rect x="0" y="0" width="100" height="44" rx="10" fill="#FFF1F2" filter="url(#shadowIn)"/>
      <text x="50" y="28" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="800" fill="#F43F5E">Rp 9,8Jt</text>
      <text x="50" y="-4" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" font-weight="600" fill="#6B7280" letter-spacing="1.5">EXPENSE</text>
    </g>

    <!-- Balance stat -->
    <g class="coin-float" style="animation-delay:1s" transform="translate(200, 5)">
      <rect x="0" y="0" width="100" height="44" rx="10" fill="#EFF6FF" filter="url(#shadowIn)"/>
      <text x="50" y="28" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="15" font-weight="800" fill="#7C9EB2">Rp 14,5Jt</text>
      <text x="50" y="-4" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="7" font-weight="600" fill="#6B7280" letter-spacing="1.5">BALANCE</text>
    </g>

    <!-- Mini chart bars -->
    <g transform="translate(0, 75)">
      <text x="165" y="-6" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" font-weight="600" fill="#6B7280" letter-spacing="1">CASH FLOW</text>

      <!-- 6 grouped bars (income + expense per day) -->
      <g class="bar-income">
        <rect x="20" y="-40" width="18" height="40" rx="4" fill="url(#incomeGrad)" opacity="0.85"/>
        <rect x="42" y="-25" width="18" height="25" rx="4" fill="url(#expenseGrad)" opacity="0.85"/>
      </g>
      <g class="bar-income" style="animation-delay:0.2s">
        <rect x="70" y="-55" width="18" height="55" rx="4" fill="url(#incomeGrad)" opacity="0.85"/>
        <rect x="92" y="-35" width="18" height="35" rx="4" fill="url(#expenseGrad)" opacity="0.85"/>
      </g>
      <g class="bar-income" style="animation-delay:0.35s">
        <rect x="120" y="-32" width="18" height="32" rx="4" fill="url(#incomeGrad)" opacity="0.85"/>
        <rect x="142" y="-28" width="18" height="28" rx="4" fill="url(#expenseGrad)" opacity="0.85"/>
      </g>
      <g class="bar-income" style="animation-delay:0.5s">
        <rect x="170" y="-48" width="18" height="48" rx="4" fill="url(#incomeGrad)" opacity="0.85"/>
        <rect x="192" y="-18" width="18" height="18" rx="4" fill="url(#expenseGrad)" opacity="0.85"/>
      </g>
      <g class="bar-income" style="animation-delay:0.65s">
        <rect x="220" y="-60" width="18" height="60" rx="4" fill="url(#incomeGrad)" opacity="0.85"/>
        <rect x="242" y="-30" width="18" height="30" rx="4" fill="url(#expenseGrad)" opacity="0.85"/>
      </g>
      <g class="bar-income" style="animation-delay:0.8s">
        <rect x="270" y="-38" width="18" height="38" rx="4" fill="url(#incomeGrad)" opacity="0.85"/>
        <rect x="292" y="-15" width="18" height="15" rx="4" fill="url(#expenseGrad)" opacity="0.85"/>
      </g>
    </g>

    <!-- Bottom divider -->
    <line x1="-35" y1="170" x2="375" y2="170" stroke="#7C9EB2" stroke-width="0.5" opacity="0.08"/>

    <!-- Mini profile section -->
    <g transform="translate(-30, 145)">
      <circle cx="14" cy="14" r="14" fill="#DCE7F5" filter="url(#shadowIn)"/>
      <text x="14" y="19" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#7C9EB2">SG</text>
      <circle cx="14" cy="14" r="14" fill="none" stroke="#7C9EB2" stroke-width="0.5" opacity="0.3"/>
      <text x="36" y="16" font-family="'Segoe UI',sans-serif" font-size="10" font-weight="600" fill="#374151">Sio Girsang</text>
      <text x="36" y="28" font-family="'Segoe UI',sans-serif" font-size="8" fill="#9CA3AF">Financial Dashboard</text>
    </g>
  </g>

  <!-- ===== TITLE & SUBTITLE ===== -->
  <text x="540" y="68" text-anchor="middle" font-family="'Segoe UI',-apple-system,sans-serif" font-size="32" font-weight="800" fill="#1E3A5F" class="title-glow">Neomorphism Web Template</text>

  <text x="540" y="92" text-anchor="middle" font-family="'Segoe UI',-apple-system,sans-serif" font-size="13" fill="#64748B" class="subtitle-slide">Financial Dashboard — Neumorphic UI Design dengan Tailwind CSS</text>

  <!-- ===== TECH BADGES ===== -->
  <g transform="translate(540, 360)">
    <g class="badge-float">
      <rect x="-145" y="-18" width="100" height="36" rx="18" fill="#FAFBFC" stroke="#DCE7F5" stroke-width="1" filter="url(#shadowOut)"/>
      <text x="-95" y="5" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#7C9EB2" font-weight="700">Tailwind CSS</text>
    </g>
    <g class="badge-float" style="animation-delay:0.4s">
      <rect x="-35" y="-18" width="95" height="36" rx="18" fill="#FAFBFC" stroke="#DCE7F5" stroke-width="1" filter="url(#shadowOut)"/>
      <text x="12" y="5" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#7C9EB2" font-weight="700">JavaScript</text>
    </g>
    <g class="badge-float" style="animation-delay:0.8s">
      <rect x="65" y="-18" width="80" height="36" rx="18" fill="#FAFBFC" stroke="#DCE7F5" stroke-width="1" filter="url(#shadowOut)"/>
      <text x="105" y="5" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#7C9EB2" font-weight="700">CSS3</text>
    </g>
    <g class="badge-float" style="animation-delay:1.2s">
      <rect x="155" y="-18" width="100" height="36" rx="18" fill="#FAFBFC" stroke="#DCE7F5" stroke-width="1" filter="url(#shadowOut)"/>
      <text x="205" y="5" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" fill="#7C9EB2" font-weight="700">Neumorphism</text>
    </g>
  </g>

  <!-- ===== BOTTOM SIGNAL BARS ===== -->
  <g transform="translate(540, 405)">
    <rect class="signal-bar" x="-20" y="-16" width="6" height="16" rx="2" fill="#7C9EB2"/>
    <rect class="signal-bar" style="animation-delay:0.15s" x="-10" y="-22" width="6" height="22" rx="2" fill="#7C9EB2"/>
    <rect class="signal-bar" style="animation-delay:0.3s" x="0" y="-28" width="6" height="28" rx="2" fill="#7C9EB2"/>
    <rect class="signal-bar" style="animation-delay:0.45s" x="10" y="-24" width="6" height="24" rx="2" fill="#7C9EB2"/>
    <rect class="signal-bar" style="animation-delay:0.6s" x="20" y="-18" width="6" height="18" rx="2" fill="#7C9EB2"/>
    <text x="3" y="10" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="8" fill="#94A3B8" letter-spacing="2">LIVE</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="436" width="960" height="4" fill="#7C9EB2" opacity="0.12" rx="2"/>
</svg>
